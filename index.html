<!DOCTYPE html>

<head>
  <title>My Beautiful Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      background-color: #EBEADE;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #181715;
    }

    ul {
      list-style-type: none;
      padding: 50px;
      margin: 0;
    }

    li {
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th,

      padding: 10px;
      border: 1px solid #2D2D2F;
      text-align: center;
    }

    tr td:first-child {
      font-weight: bold;
      text-align: left;
    }

    .btn {
      display: inline-block;
      padding: 8px 16px;
      background-color: #EB1700;
      color: #fff;
      text-align: center;
      border-radius: 4px;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      opacity: 0.8;
      color: #ffffff;
    }

    a {
      text-decoration: none;
      color: #2D2D2F;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #EB1700;
    }
  </style>
</head>
